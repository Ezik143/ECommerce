<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kintsugi | Curated Commerce - Premium Artisanal Products</title>
    <meta name="description" content="Discover curated luxury items from master artisans worldwide. Kintsugi offers carefully selected products that blend traditional craftsmanship with modern design." />
    <meta name="keywords" content="curated commerce, luxury products, artisanal goods, handmade, premium shopping, kintsugi, curated marketplace" />
    <meta name="author" content="Kintsugi" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="googlebot" content="index, follow, max-snippet:-1, max-image-preview:large" />
    <link rel="canonical" href="https://example.com" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://example.com" />
    <meta property="og:title" content="Kintsugi | Curated Commerce" />
    <meta property="og:description" content="Discover curated luxury items from master artisans worldwide. Premium artisanal marketplace with carefully selected products." />
    <meta property="og:image" content="https://example.com/landing-page.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Kintsugi" />
    <meta property="og:locale" content="en_US" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://example.com" />
    <meta name="twitter:title" content="Kintsugi | Curated Commerce" />
    <meta name="twitter:description" content="Discover curated luxury items from master artisans worldwide. Shop premium artisanal products." />
    <meta name="twitter:image" content="https://example.com/landing-page.png" />
    
    <!-- Structured Data - Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org/",
        "@type": "Organization",
        "name": "Kintsugi",
        "url": "https://example.com",
        "logo": "https://example.com/vite.svg",
        "description": "Curated marketplace for premium artisanal products",
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "US"
        },
        "sameAs": [
          "https://www.instagram.com/kintsugi/",
          "https://www.facebook.com/kintsugi/"
        ],
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "customer support",
          "email": "support@example.com"
        }
      }
    </script>
    
    <!-- Preconnect to external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
    <script>
      (function() {
        var t = null;
        try { t = localStorage.getItem('kintsugi-theme'); } catch(e) {}
        if (!t) { t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'; }
        if (t === 'light' || t === 'dark') { document.documentElement.setAttribute('data-theme', t); }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div id="toast-portal"></div>
    <div id="modal-portal"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
